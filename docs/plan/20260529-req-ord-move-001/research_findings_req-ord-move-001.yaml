related_conventions:
  naming_patterns_in_domain: |
    Records named with PascalCase; package-private static helpers in UI use
    lowerCamelCase. Test methods use `subject_action_expectedOutcome` style
    (e.g., `moveOrder_movesUnitToTarget`). Follow `assignMoveTarget_replacesExistingMoveOrderForSameUnit` etc.
  structure_of_domain: |
    Domain records in game.domain (immutable). Engine in game.engine. UI in
    game.screens. Scenario IO in game.scenario. New code lives in existing
    packages — no new package needed.
  error_handling_in_domain: |
    requireNonNull at record constructors; silent ignore for invalid MOVE
    (engine). New API should requireNonNull(unitId), accept any int for
    coordinates (engine validates), and tolerate unknown unitId (clarify
    below — likely silently ignore, matching invalid-move policy).
  testing_in_domain: |
    Engine tests in core/src/test/java/game; UI helper tests in
    core/src/test/java/game/screens. New tests split by concern:
    - GameRuntime persistence test (assign + retrieve + replace)
    - TurnEngine multi-unit MOVE test for REQ-ORD-MOVE-003 evidence (if scope extends)
    - GameRuntime end-to-end test: assign -> simulateOneTurn -> unit moved -> pendingOrders empty
  documentation_in_domain: |
    Every new normative rule MUST add executable evidence to
    docs/engine/traceability-matrix.md (per matrix governance §4). Flip
    REQ-ORD-MOVE-001 (and 002) rows from Planned -> Implemented with test refs.
    Optionally update docs/guides/user-guide.md "Move Target Planning" section
    to note that End Turn now executes the confirmed targets.

