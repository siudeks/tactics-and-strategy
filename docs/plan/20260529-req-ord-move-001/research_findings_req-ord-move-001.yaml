    - End-to-end: confirm-target -> simulateOneTurn -> unit moved
    - Determinism: same sequence of assignMoveTarget + simulateOneTurn -> same canonicalSnapshot
  test_organization: |
    Engine/runtime tests under core/src/test/java/game/*.java.
    UI helper tests under core/src/test/java/game/screens/*.java.
    Naming: `<subject>_<action>_<expectedOutcome>()` snake-case.
