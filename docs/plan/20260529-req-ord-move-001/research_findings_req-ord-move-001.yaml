open_questions:
  - question: Should GameRuntime.assignMoveTarget reject unknown unitId, or silently ignore?
    context: Engine silently ignores invalid moves (NFR-REL-003). For consistency, runtime SHOULD also silently ignore (no-op) unknown unitId rather than throwing. Locking this answer reduces test churn.
    type: decision_blocker
    affects: [GameRuntime.java, new tests]
  - question: Should assignMoveTarget validate Order.side == active side / unit.side, or trust the caller (UI already filters)?
    context: UI guarantees side correctness today, but a defensive engine API improves robustness. Recommend trust + assert in tests (no runtime check) — matches "no validation beyond engine §4.3" pattern.
    type: nice_to_know
    affects: [GameRuntime.java]
  - question: Should the UI render the persistent flag marker from CampaignState.pendingOrders (single source of truth) or keep MapPanel.moveTargetsByUnit as a render cache?
    context: Single source of truth is cleaner and removes drift risk after `simulateOneTurn` clears orders. Recommend: derive from pendingOrders for the flag marker; remove private moveTargetsByUnit.
    type: decision_blocker
    affects: [BattlefieldScreen.java, BattlefieldScreenUnitSelectionTest.java (nextUnassignedUnitId tests would need a Map projected from pendingOrders)]
  - question: How is the synthesized Order.id constructed (must be deterministic for NFR-DET-004)?
    context: Engine canonicalSnapshot doesn't include Order ids, but pendingOrders are cleared at end of turn anyway. Recommend `"move-" + unitId` (stable, unique-per-unit, naturally replace-on-reassign via List<Order> rebuild that filters out existing move-<unitId>).
    type: decision_blocker
    affects: [GameRuntime.java]

