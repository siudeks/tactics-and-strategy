patterns_found:
  - category: architecture
    pattern: Immutable-record rebuild for state mutation
    description: |
      All domain values are records (Order, Unit, CampaignState, ScenarioDefinition).
      Mutation = construct new record. CampaignState.copyOf-on-construct enforces
      external immutability. GameRuntime is the single mutable boundary
      (`loadedScenario` field reassigned in `simulateOneTurn`).
    examples:
      - file: core/src/main/java/game/engine/TurnEngine.java
        location: TurnEngine.java:38-46
        snippet: "new CampaignState(state.campaignId(), state.scenarioId(), state.turnNumber()+1, nextSide, updatedUnits, List.of())"
      - file: core/src/main/java/game/engine/GameRuntime.java
        location: GameRuntime.java:29-32
        snippet: "loadedScenario = new LoadedScenario(loadedScenario.scenarioDefinition(), result.state());"
    prevalence: common
  - category: architecture
    pattern: Pure static helpers in UI for unit-testable logic
    description: |
      BattlefieldScreen exposes package-private static helpers
      (moveTargetAssignmentForClick, movePreviewTile, nextUnassignedUnitId,
      shouldPlayMoveConfirmationSound, isPassableTerrainCode) that are
      verified by BattlefieldScreenUnitSelectionTest WITHOUT a libGDX context.
      New code should follow this style.
    examples:
      - file: core/src/main/java/game/screens/BattlefieldScreen.java
        location: BattlefieldScreen.java:485-502
        snippet: "static @Nullable MoveTargetAssignment moveTargetAssignmentForClick(...)"
    prevalence: common
  - category: testing
    pattern: Engine-level test = construct state -> runOneTurn -> assert post-state
    description: Used uniformly in TurnEngineOrderTest and OneTurnSimulationTest.
    examples:
      - file: core/src/test/java/game/TurnEngineOrderTest.java
        location: TurnEngineOrderTest.java:27-44
        snippet: "TurnResult result = engineFor(sandMap()).runOneTurn(state);"
    prevalence: common
  - category: error_handling
    pattern: Silent ignore for invalid MOVE — never throw
    description: Reinforced by NFR-REL-003 and engine-spec §4.3 #4; new API must propagate this (invalid (x,y) still gets persisted as an Order, engine then silently no-ops).
    examples:
      - file: core/src/main/java/game/engine/TurnEngine.java
        location: TurnEngine.java:65-72
        snippet: "if (target != null && isValidMove(target[0], target[1])) { ... } else { result.add(unit); }"
    prevalence: common
  - category: naming
    pattern: REQ-IDs in test names and javadoc-style comments
    description: Tests do not embed REQ ids in names directly (e.g., `moveOrder_movesUnitToTarget`), but the traceability matrix maps tests back to REQ IDs. Follow the same convention: descriptive snake-case test names + matrix linkage.
    examples:
      - file: docs/engine/traceability-matrix.md
        location: traceability-matrix.md:9-17
        snippet: "TurnEngineOrderTest.moveOrder_movesUnitToTarget"
    prevalence: common

related_architecture:
  components_relevant_to_domain:
    - component: TurnEngine
      responsibility: Run 5-phase turn; consume pendingOrders during SIMULTANEOUS_MOVE
      location: core/src/main/java/game/engine/TurnEngine.java
      relationship_to_domain: Consumes Order(type=MOVE) from CampaignState; produces new CampaignState with pendingOrders=[]
    - component: GameRuntime
      responsibility: Holds active LoadedScenario; exposes turn simulation; THE mutable boundary
      location: core/src/main/java/game/engine/GameRuntime.java
      relationship_to_domain: Sole legitimate mutator of CampaignState reference; natural host for assignMoveTarget
    - component: BattlefieldScreen.MapPanel
      responsibility: Produces MoveTargetAssignment from click; today stores it privately
      location: core/src/main/java/game/screens/BattlefieldScreen.java
      relationship_to_domain: Will call GameRuntime.assignMoveTarget(unitId, x, y) on confirm
    - component: ScenarioLoader
      responsibility: Parses initial pendingOrders from JSON
      location: core/src/main/java/game/scenario/ScenarioLoader.java
      relationship_to_domain: Reference impl of building Order records — id, unitId, side, type, targetX, targetY
  interfaces_used_by_domain:
    - interface: CampaignState (record)
      location: core/src/main/java/game/domain/CampaignState.java
      usage_pattern: Read-only outside engine/runtime; reconstructed for every mutation
    - interface: Order (record)
      location: core/src/main/java/game/domain/Order.java
      usage_pattern: Synthesized in runtime; consumed in engine by Order.unitId / Order.type / Order.targetX/Y
  data_flow_involving_domain: |
    Current: User click -> BattlefieldScreen.touchUp -> moveTargetAssignmentForClick
      -> MapPanel.moveTargetsByUnit.put(...) [DEAD END, never reaches engine]
    Click "End Turn" -> BattlefieldScreen.endTurn -> GameRuntime.simulateOneTurn
      -> TurnEngine.runOneTurn(CampaignState{pendingOrders=[]}) -> no movement.

    Target: User click -> BattlefieldScreen.touchUp -> moveTargetAssignmentForClick
      -> GameRuntime.assignMoveTarget(unitId, tileX, tileY)
      -> rebuild CampaignState with replaced/added MOVE Order (keyed by unitId)
      -> (optional UI cache mirror for flag marker render).
    End Turn -> simulateOneTurn -> TurnEngine consumes pendingOrders -> units moved -> pendingOrders cleared.
  key_relationships_to_domain:
    - from: BattlefieldScreen.MapPanel
      to: GameRuntime
      relationship: calls
    - from: GameRuntime
      to: CampaignState
      relationship: rebuilds
    - from: TurnEngine
      to: CampaignState.pendingOrders
      relationship: reads

