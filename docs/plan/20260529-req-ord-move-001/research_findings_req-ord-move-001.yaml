plan_id: 20260529-req-ord-move-001
objective: |
  Provide complete implementation context for REQ-ORD-MOVE-001 (and bundled
  REQ-ORD-MOVE-002 per clarified scope): persist the per-unit MOVE target
  confirmed in the UI as a unit-scoped order in CampaignState.pendingOrders,
  and ensure the existing TurnEngine SIMULTANEOUS_MOVE phase consumes it
  end-to-end on End Turn.
focus_area: REQ-ORD-MOVE-001 (MOVE order persistence + engine consumption)
created_at: 2026-05-29
created_by: gem-researcher
status: completed

tldr: |
  - REQ-ORD-MOVE-001 IS present in docs/requirements/game-requirements-plan.md
    (line 75), game-requirements-functional.md (line 88, "Planned" section),
    and docs/engine/traceability-matrix.md (line 41, status `Planned`).
  - Engine already implements MOVE consumption: TurnEngine.applyMoveOrders
    reads CampaignState.pendingOrders, picks orders with type==MOVE, validates
    via isValidMove (bounds + non-VOID/WATER terrain), and updates units.
    Out-of-bounds/invalid moves are silently ignored; HOLD orders are no-ops.
  - UI already implements MOVE target confirmation: BattlefieldScreen.MapPanel
    stores assignments in a private `Map<String, TileCoord> moveTargetsByUnit`
    (HashMap) populated by `moveTargetAssignmentForClick(...)` on touchUp.
  - GAP: there is NO bridge from UI's `moveTargetsByUnit` to engine's
    `CampaignState.pendingOrders`. `endTurn()` calls `gameRuntime.simulateOneTurn()`
    with whatever pendingOrders are in the loaded scenario (initially empty),
    so confirmed UI targets never move the unit on end-turn.
  - Clarified scope (user answers): implement REQ-ORD-MOVE-001 + REQ-ORD-MOVE-002.
    Persist via pendingOrders (option A), new API GameRuntime.assignMoveTarget(
    unitId, tileX, tileY), replace-on-reassign, cleared at END_TURN (already
    happens via TurnEngine).
  - Critical files to change: GameRuntime.java (new mutating API + state copy
    helper), BattlefieldScreen.java (remove private moveTargetsByUnit OR keep
    as render cache but flush via runtime), CampaignState (remains immutable;
    GameRuntime rebuilds it). TurnEngine itself needs no change.
  - Open: whether CampaignState should expose a `withPendingOrders` helper or
    whether the rebuild stays inside GameRuntime; whether UI keeps a local
    render cache for the persistent flag marker or reads back from CampaignState.

