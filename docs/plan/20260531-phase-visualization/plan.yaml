tldr: |
  Add UI-layer phase overlay sequencing in BattlefieldScreen/MapPanel driven by TurnResult.phaseTrace,
  enforce full interaction lock and End Turn idempotency while overlay is active, add screen tests in
  existing test suites, and update requirement + traceability docs with executable evidence. Keep
  timing strictly in UI render/update paths to avoid any engine delays and preserve determinism.
open_questions: []
gaps: []
pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "Overlay sequence accidentally introduces engine-side sleep/delay or phase mutation, breaking determinism contracts."
      likelihood: low
      impact: critical
      mitigation: "Constrain all timing to BattlefieldScreen/MapPanel render/update state and run EngineDeterminismSmokeTest in verification."
    - scenario: "Input lock misses one interaction path (keyboard, map click, drag, zoom), allowing state mutation mid-sequence."
      likelihood: medium
      impact: high
      mitigation: "Centralize interaction gating behind overlay-active guard and add targeted tests in existing screen test files."
    - scenario: "End Turn action can be triggered twice while overlay is active, causing duplicate simulation execution."
      likelihood: medium
      impact: high
      mitigation: "Add explicit in-flight/active guard around end-turn entry path and assert single-execution behavior in tests."
  assumptions:
    - "TurnResult.phaseTrace already contains canonical phase order including RETREAT for full turn simulation evidence."
    - "BattlefieldScreen and MapPanel are the intended UI integration points for overlays and input control."
    - "Engine runtime behavior remains unchanged; only UI sequencing and docs/tests are modified."
