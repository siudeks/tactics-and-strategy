  component_details:
    - component: "BattlefieldScreen phase overlay sequencer"
      responsibility: "Build and run 3-second-per-phase fullscreen overlay sequence from TurnResult.phaseTrace and render dimmed phase banner."
      interfaces:
        - "End-turn handler consumes TurnResult.phaseTrace and initializes overlay queue."
        - "Render/update tick advances active phase by delta until sequence completion."
      dependencies:
        - component: "GameRuntime.simulateOneTurn / TurnResult.phaseTrace"
          relationship: "Data source only; no timing changes"
      integration_points:
        - "BattlefieldScreen.endTurn entry path"
