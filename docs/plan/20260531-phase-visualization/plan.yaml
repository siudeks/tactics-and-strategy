          relationship: "Receives or checks lock state"
      integration_points:
        - "BattlefieldScreen input processing callbacks"
        - "MapPanel interaction entry points"
    - component: "Screen test evidence"
      responsibility: "Verify phase order/timing, RETREAT inclusion, input lock coverage, and post-sequence unlock behavior."
      interfaces:
        - "Existing screen test fixtures and helpers"
      dependencies:
        - component: "BattlefieldScreen overlay API/state"
          relationship: "Verification only"
      integration_points:
        - "BattlefieldScreenRenderingTest"
        - "BattlefieldScreenUnitSelectionTest"
