name: Release Windows Build to itch.io

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      channel:
        description: itch.io channel
        required: true
        default: windows
      version:
        description: User-visible build version
        required: true

jobs:
  release:
    runs-on: windows-latest
    env:
      RELEASE_CHANNEL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.channel || 'windows' }}
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Build Windows bundle with embedded runtime
        shell: pwsh
        run: .\gradlew.bat lwjgl3:packageWindowsBundledRelease

      - name: Install butler
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $installDir = Join-Path $PWD 'butler-bin'
          New-Item -ItemType Directory -Path $installDir -Force | Out-Null

          $urls = @(
            'https://broth.itch.ovh/butler/windows-amd64/LATEST/butler.zip',
            'https://broth.itch.ovh/butler/windows-amd64/LATEST/archive/default'
          )

          $installed = $false
          foreach ($url in $urls) {
            try {
              Write-Host "Trying to download butler from $url"
              $downloadPath = Join-Path $PWD 'butler-download.bin'
              Invoke-WebRequest -Uri $url -OutFile $downloadPath

              try {
                Expand-Archive -Path $downloadPath -DestinationPath $installDir -Force
                if (Test-Path (Join-Path $installDir 'butler.exe')) {
                  $installed = $true
                  break
                }
              } catch {
                # Not a zip archive, try treating it as a raw executable.
              }

              Copy-Item $downloadPath (Join-Path $installDir 'butler.exe') -Force
              & (Join-Path $installDir 'butler.exe') -V | Out-Null
              $installed = $true
              break
            } catch {
              Write-Host "Failed download/validation from $url: $($_.Exception.Message)"
            }
          }

          if (-not $installed) {
            throw 'Unable to install butler from known download URLs.'
          }

          Add-Content -Path $env:GITHUB_PATH -Value $installDir
          butler -V

      - name: Upload to itch.io
        shell: pwsh
        env:
          BUTLER_API_KEY: ${{ secrets.ITCH_IO_API_KEY }}
          ITCH_IO_GAME_ID: ${{ secrets.ITCH_IO_GAME_ID }}
        run: |
          if (-not $env:BUTLER_API_KEY) { throw "Missing secret ITCH_IO_API_KEY" }
          if (-not $env:ITCH_IO_GAME_ID) { throw "Missing secret ITCH_IO_GAME_ID" }
          butler push lwjgl3/build/distributions/tactics-and-strategy-windows-x64.zip "$env:ITCH_IO_GAME_ID:$env:RELEASE_CHANNEL" --userversion "$env:RELEASE_VERSION"

      - name: Show published artifact details
        shell: pwsh
        run: Get-ChildItem lwjgl3/build/distributions | Format-Table Name,Length
