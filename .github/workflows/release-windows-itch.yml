name: Release Windows Build to itch.io

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      channel:
        description: itch.io channel
        required: true
        default: windows
      version:
        description: User-visible build version
        required: true

jobs:
  release:
    runs-on: windows-latest
    env:
      RELEASE_CHANNEL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.channel || 'windows' }}
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Build single runnable JAR
        shell: pwsh
        run: .\gradlew.bat lwjgl3:fatJar

      - name: Install butler
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $installDir = Join-Path $PWD 'butler-bin'
          New-Item -ItemType Directory -Path $installDir -Force | Out-Null

          $installed = $false

          try {
            Write-Host 'Resolving latest butler release from GitHub API'
            $release = Invoke-RestMethod -Uri 'https://api.github.com/repos/itchio/butler/releases/latest'
            $asset = $release.assets | Where-Object { $_.name -eq 'butler-windows-amd64.zip' } | Select-Object -First 1

            if ($null -eq $asset) {
              throw 'Asset butler-windows-amd64.zip not found in latest release.'
            }

            $zipPath = Join-Path $PWD 'butler.zip'
            Write-Host "Downloading butler from $($asset.browser_download_url)"
            Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $zipPath
            Expand-Archive -Path $zipPath -DestinationPath $installDir -Force

            if (-not (Test-Path (Join-Path $installDir 'butler.exe'))) {
              throw 'Downloaded archive did not contain butler.exe'
            }

            $installed = $true
          } catch {
            Write-Host "GitHub release download failed: $($_.Exception.Message)"
          }

          if (-not $installed) {
            Write-Host 'Falling back to Chocolatey installation'
            choco install butler -y --no-progress
            $installed = $true
            $installDir = ''
          }

          if ($installDir -ne '') {
            Add-Content -Path $env:GITHUB_PATH -Value $installDir
          }
          butler -V

      - name: Upload to itch.io
        shell: pwsh
        env:
          BUTLER_API_KEY: ${{ secrets.ITCH_IO_API_KEY }}
          ITCH_IO_GAME_ID: ${{ secrets.ITCH_IO_GAME_ID }}
        run: |
          if (-not $env:BUTLER_API_KEY) { throw "Missing secret ITCH_IO_API_KEY" }
          if (-not $env:ITCH_IO_GAME_ID) { throw "Missing secret ITCH_IO_GAME_ID" }
          $gameId = $env:ITCH_IO_GAME_ID.Trim()
          $channel = $env:RELEASE_CHANNEL.Trim()

          if ($gameId -notmatch '^[^/]+/[^/]+$') {
            throw "Invalid ITCH_IO_GAME_ID format. Expected username/game-slug, got: $gameId"
          }
          if (-not $channel) {
            throw "RELEASE_CHANNEL is empty"
          }

          $publishTarget = '{0}:{1}' -f $gameId, $channel
          if ($publishTarget -notmatch '^[^/]+/[^:]+:[^:]+$') {
            throw "Invalid butler publish target: $publishTarget"
          }

          Write-Host "Publishing game '$gameId' to channel '$channel'"
          Write-Host "Butler target: $publishTarget"
          Write-Host "Removing current build from channel before upload"
          butler unpublish "$publishTarget"
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Unpublish did not complete cleanly (possibly empty channel). Continuing with push."
          }

          butler push lwjgl3/build/libs/tactics-and-strategy-all.jar "$publishTarget" --userversion "$env:RELEASE_VERSION"

      - name: Show published artifact details
        shell: pwsh
        run: |
          if (Test-Path 'lwjgl3/build/libs') {
            Get-ChildItem lwjgl3/build/libs | Format-Table Name,Length
          } else {
            Write-Host 'Expected output directory missing: lwjgl3/build/libs'
            Write-Host 'Workspace tree preview:'
            Get-ChildItem lwjgl3/build -Recurse -Depth 2 | Format-Table FullName
            throw 'Artifact directory not found.'
          }
