<svg xmlns="http://www.w3.org/2000/svg" width="512" height="384" viewBox="0 0 512 384">
  <!-- ZX Spectrum Combat Resolution Screen – Desert Rats -->
  <rect width="512" height="384" fill="#000000"/>
  <!-- Red border -->
  <rect x="0"   y="0"   width="512" height="32"  fill="#AA0000"/>
  <rect x="0"   y="352" width="512" height="32"  fill="#AA0000"/>
  <rect x="0"   y="32"  width="32"  height="320" fill="#AA0000"/>
  <rect x="480" y="32"  width="32"  height="320" fill="#AA0000"/>

  <!-- Header -->
  <text x="256" y="80" font-family="monospace" font-size="22" font-weight="bold"
        fill="#FF0000" text-anchor="middle">COMBAT RESOLUTION</text>

  <!-- Attacker counter (green) -->
  <rect x="80" y="105" width="80" height="80" fill="#008800" rx="4"/>
  <text x="120" y="130" font-family="monospace" font-size="24" fill="#FFFFFF" text-anchor="middle">╠═╣</text>
  <text x="120" y="155" font-family="monospace" font-size="14" fill="#FFFFFF" text-anchor="middle">4/3</text>
  <text x="120" y="170" font-family="monospace" font-size="11" fill="#FFFF00" text-anchor="middle">ATTACKER</text>
  <text x="120" y="202" font-family="monospace" font-size="13" fill="#FFFFFF" text-anchor="middle">ATK TOTAL: 6</text>

  <!-- VS label -->
  <text x="256" y="155" font-family="monospace" font-size="28" font-weight="bold"
        fill="#FFFF00" text-anchor="middle">VS</text>

  <!-- Defender counter (grey) -->
  <rect x="352" y="105" width="80" height="80" fill="#888888" rx="4"/>
  <text x="392" y="130" font-family="monospace" font-size="24" fill="#000000" text-anchor="middle">╠═╣</text>
  <text x="392" y="155" font-family="monospace" font-size="14" fill="#000000" text-anchor="middle">4/3</text>
  <text x="392" y="170" font-family="monospace" font-size="11" fill="#000000" text-anchor="middle">DEFENDER</text>
  <text x="392" y="202" font-family="monospace" font-size="13" fill="#FFFFFF" text-anchor="middle">DEF TOTAL: 3</text>

  <!-- Odds and terrain -->
  <line x1="60" y1="215" x2="452" y2="215" stroke="#555555" stroke-width="1"/>
  <text x="256" y="238" font-family="monospace" font-size="14" fill="#FFFFFF" text-anchor="middle">ODDS: 2:1</text>
  <text x="256" y="258" font-family="monospace" font-size="14" fill="#AAAAAA" text-anchor="middle">TERRAIN MODIFIER: +1 DEFENDER</text>
  <text x="256" y="278" font-family="monospace" font-size="14" fill="#FFFF00" text-anchor="middle">ADJUSTED ODDS: 1:1</text>

  <!-- Die roll -->
  <rect x="220" y="288" width="72" height="40" fill="#000088" rx="6" stroke="#FFFFFF" stroke-width="2"/>
  <text x="256" y="316" font-family="monospace" font-size="28" font-weight="bold"
        fill="#FFFF00" text-anchor="middle">4</text>
  <text x="256" y="284" font-family="monospace" font-size="12" fill="#AAAAAA" text-anchor="middle">ROLL</text>

  <!-- Result -->
  <text x="256" y="348" font-family="monospace" font-size="16" font-weight="bold"
        fill="#FFFFFF" text-anchor="middle">RESULT: DEFENDER RETREAT</text>

  <!-- Continue prompt -->
  <text x="256" y="370" font-family="monospace" font-size="11" fill="#FFFF00" text-anchor="middle">PRESS ANY KEY TO CONTINUE</text>
</svg>
