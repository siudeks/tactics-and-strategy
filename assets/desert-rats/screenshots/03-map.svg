<svg xmlns="http://www.w3.org/2000/svg" width="512" height="384" viewBox="0 0 512 384">
  <!-- ZX Spectrum Main Map Screen – Desert Rats -->
  <!-- Background + cyan border (Allied turn) -->
  <rect width="512" height="384" fill="#00AAAA"/>
  <rect x="32" y="32" width="448" height="320" fill="#000000"/>

  <!-- ── Status bar (top 2 rows) ─────────────────────────── -->
  <rect x="32" y="32" width="448" height="36" fill="#000088"/>
  <text x="44"  y="54" font-family="monospace" font-size="13" fill="#FFFFFF">TURN: 3/10</text>
  <text x="200" y="54" font-family="monospace" font-size="13" fill="#FFFF00" text-anchor="middle">ALLIED MOVEMENT PHASE</text>
  <text x="430" y="54" font-family="monospace" font-size="13" fill="#FFFFFF" text-anchor="end">VP A:8  X:5</text>

  <!-- ── Map grid (desert tiles) ────────────────────────── -->
  <!-- Each cell = 28×28 px; grid starts at (32,68), 16 cols × 9 rows -->
  <defs>
    <!-- Desert tile -->
    <rect id="td" width="28" height="28" fill="#D4AA00"/>
    <!-- Rocky tile -->
    <rect id="tr" width="28" height="28" fill="#8B6914"/>
    <!-- Ridge tile -->
    <rect id="tg" width="28" height="28" fill="#5a3e10"/>
    <!-- Town tile -->
    <rect id="tt" width="28" height="28" fill="#888888"/>
    <!-- Road (overlay) -->
    <line id="road" x1="0" y1="14" x2="28" y2="14" stroke="#FFFFFF" stroke-width="2"/>
  </defs>

  <!-- Row 0 (y=68) -->
  <g transform="translate(32,68)">
    <rect width="28" height="28" fill="#D4AA00"/><rect x="28"  width="28" height="28" fill="#D4AA00"/>
    <rect x="56"  width="28" height="28" fill="#D4AA00"/><rect x="84"  width="28" height="28" fill="#8B6914"/>
    <rect x="112" width="28" height="28" fill="#8B6914"/><rect x="140" width="28" height="28" fill="#5a3e10"/>
    <rect x="168" width="28" height="28" fill="#5a3e10"/><rect x="196" width="28" height="28" fill="#D4AA00"/>
    <rect x="224" width="28" height="28" fill="#D4AA00"/><rect x="252" width="28" height="28" fill="#D4AA00"/>
    <rect x="280" width="28" height="28" fill="#D4AA00"/><rect x="308" width="28" height="28" fill="#D4AA00"/>
    <rect x="336" width="28" height="28" fill="#888888"/><rect x="364" width="28" height="28" fill="#D4AA00"/>
    <rect x="392" width="28" height="28" fill="#D4AA00"/><rect x="420" width="28" height="28" fill="#D4AA00"/>
    <!-- Road overlay row 0 -->
    <line x1="0" y1="14" x2="448" y2="14" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
  </g>
  <!-- Row 1 (y=96) -->
  <g transform="translate(32,96)">
    <rect width="448" height="28" fill="#D4AA00"/>
    <!-- Wadi (blue stripe) -->
    <rect y="22" width="448" height="6" fill="#0055AA" opacity="0.7"/>
  </g>
  <!-- Rows 2-6 (y=124–236): plain desert with some rocky patches -->
  <rect x="32"  y="124" width="448" height="28" fill="#D4AA00"/>
  <rect x="32"  y="152" width="448" height="28" fill="#D4AA00"/>
  <rect x="168" y="152" width="84"  height="28" fill="#8B6914"/>
  <rect x="32"  y="180" width="448" height="28" fill="#D4AA00"/>
  <rect x="252" y="180" width="56"  height="28" fill="#8B6914"/>
  <rect x="32"  y="208" width="448" height="28" fill="#D4AA00"/>
  <rect x="32"  y="236" width="448" height="28" fill="#D4AA00"/>
  <!-- Row 7 (y=264): more desert -->
  <rect x="32"  y="264" width="448" height="28" fill="#D4AA00"/>
  <!-- Row 8 (y=292): last row -->
  <rect x="32"  y="292" width="448" height="20" fill="#D4AA00"/>

  <!-- ── Grid lines ──────────────────────────────────────── -->
  <g stroke="#C09000" stroke-width="0.5" opacity="0.5">
    <line x1="32"  y1="68" x2="32"  y2="312"/>
    <line x1="60"  y1="68" x2="60"  y2="312"/>
    <line x1="88"  y1="68" x2="88"  y2="312"/>
    <line x1="116" y1="68" x2="116" y2="312"/>
    <line x1="144" y1="68" x2="144" y2="312"/>
    <line x1="172" y1="68" x2="172" y2="312"/>
    <line x1="200" y1="68" x2="200" y2="312"/>
    <line x1="228" y1="68" x2="228" y2="312"/>
    <line x1="256" y1="68" x2="256" y2="312"/>
    <line x1="284" y1="68" x2="284" y2="312"/>
    <line x1="312" y1="68" x2="312" y2="312"/>
    <line x1="340" y1="68" x2="340" y2="312"/>
    <line x1="368" y1="68" x2="368" y2="312"/>
    <line x1="396" y1="68" x2="396" y2="312"/>
    <line x1="424" y1="68" x2="424" y2="312"/>
    <line x1="452" y1="68" x2="452" y2="312"/>
    <line x1="480" y1="68" x2="480" y2="312"/>
    <line x1="32" y1="68"  x2="480" y2="68"/>
    <line x1="32" y1="96"  x2="480" y2="96"/>
    <line x1="32" y1="124" x2="480" y2="124"/>
    <line x1="32" y1="152" x2="480" y2="152"/>
    <line x1="32" y1="180" x2="480" y2="180"/>
    <line x1="32" y1="208" x2="480" y2="208"/>
    <line x1="32" y1="236" x2="480" y2="236"/>
    <line x1="32" y1="264" x2="480" y2="264"/>
    <line x1="32" y1="292" x2="480" y2="292"/>
    <line x1="32" y1="312" x2="480" y2="312"/>
  </g>

  <!-- ── Allied unit counters (green) ─────────────────────── -->
  <!-- Tank unit at col 3, row 2 -->
  <rect x="116" y="124" width="28" height="28" fill="#008800"/>
  <text x="130" y="135" font-family="monospace" font-size="7" fill="#FFFFFF" text-anchor="middle">╠═╣</text>
  <text x="130" y="147" font-family="monospace" font-size="7" fill="#FFFFFF" text-anchor="middle">4/3</text>

  <!-- Infantry unit at col 5, row 4 -->
  <rect x="172" y="180" width="28" height="28" fill="#008800"/>
  <text x="186" y="191" font-family="monospace" font-size="7" fill="#FFFFFF" text-anchor="middle">╪</text>
  <text x="186" y="203" font-family="monospace" font-size="7" fill="#FFFFFF" text-anchor="middle">2/3</text>

  <!-- Artillery at col 2, row 5 -->
  <rect x="88" y="208" width="28" height="28" fill="#008800"/>
  <text x="102" y="219" font-family="monospace" font-size="7" fill="#FFFFFF" text-anchor="middle">✦</text>
  <text x="102" y="231" font-family="monospace" font-size="7" fill="#FFFFFF" text-anchor="middle">3/1</text>

  <!-- ── Axis unit counters (grey) ─────────────────────────── -->
  <!-- Axis tank at col 10, row 2 -->
  <rect x="312" y="124" width="28" height="28" fill="#888888"/>
  <text x="326" y="135" font-family="monospace" font-size="7" fill="#000000" text-anchor="middle">╠═╣</text>
  <text x="326" y="147" font-family="monospace" font-size="7" fill="#000000" text-anchor="middle">4/3</text>

  <!-- Axis infantry at col 12, row 4 -->
  <rect x="368" y="180" width="28" height="28" fill="#888888"/>
  <text x="382" y="191" font-family="monospace" font-size="7" fill="#000000" text-anchor="middle">╪</text>
  <text x="382" y="203" font-family="monospace" font-size="7" fill="#000000" text-anchor="middle">2/2</text>

  <!-- Selected/cursor unit (flashing border) at col 3, row 2 -->
  <rect x="116" y="124" width="28" height="28" fill="none" stroke="#FFFF00" stroke-width="2"/>

  <!-- ── Status bar (bottom 3 rows) ────────────────────────── -->
  <rect x="32" y="312" width="448" height="40" fill="#000088"/>
  <text x="44" y="328" font-family="monospace" font-size="11" fill="#FFFF00">UNIT: 4TH ARMD BDE</text>
  <text x="44" y="346" font-family="monospace" font-size="11" fill="#FFFFFF">ATK:4  DEF:3  MOV:4/4  STATUS:OK</text>

  <!-- Placeholder label -->
  <text x="256" y="375" font-family="monospace" font-size="10" fill="#DDDDDD" text-anchor="middle">[ PLACEHOLDER – replace with real screenshot ]</text>
</svg>
