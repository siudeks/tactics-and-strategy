<svg xmlns="http://www.w3.org/2000/svg" width="512" height="384" viewBox="0 0 512 384">
  <!-- ZX Spectrum Title Screen – Desert Rats -->
  <!-- Background: black, border: yellow -->
  <rect width="512" height="384" fill="#000000"/>
  <!-- Yellow border -->
  <rect x="0"   y="0"   width="512" height="32"  fill="#D4AA00"/>
  <rect x="0"   y="352" width="512" height="32"  fill="#D4AA00"/>
  <rect x="0"   y="32"  width="32"  height="320" fill="#D4AA00"/>
  <rect x="480" y="32"  width="32"  height="320" fill="#D4AA00"/>
  <!-- Main area (256x192 Spectrum pixels scaled 2x) -->
  <rect x="32" y="32" width="448" height="320" fill="#000000"/>

  <!-- Title "DESERT RATS" in Spectrum yellow block letters (simulated) -->
  <text x="256" y="110"
        font-family="monospace" font-size="40" font-weight="bold"
        fill="#D4AA00" text-anchor="middle" letter-spacing="4">DESERT RATS</text>

  <!-- Sub-title -->
  <text x="256" y="150"
        font-family="monospace" font-size="18"
        fill="#FFFFFF" text-anchor="middle">A CCS WARGAME</text>

  <!-- Desert silhouette -->
  <polygon points="60,260 120,210 180,250 240,200 300,240 360,195 420,245 460,260"
           fill="#D4AA00" opacity="0.7"/>
  <ellipse cx="340" cy="195" rx="18" ry="8" fill="#D4AA00" opacity="0.5"/>
  <!-- Palm tree -->
  <line x1="200" y1="250" x2="200" y2="210" stroke="#8B6914" stroke-width="4"/>
  <ellipse cx="200" cy="208" rx="16" ry="10" fill="#2D6A00" opacity="0.9"/>

  <!-- Flashing "PRESS ANY KEY" text -->
  <text x="256" y="310"
        font-family="monospace" font-size="14"
        fill="#FFFFFF" text-anchor="middle">PRESS ANY KEY TO START</text>

  <!-- Placeholder label -->
  <text x="256" y="370"
        font-family="monospace" font-size="10"
        fill="#888888" text-anchor="middle">[ PLACEHOLDER – replace with real screenshot ]</text>
</svg>
