<svg xmlns="http://www.w3.org/2000/svg" width="512" height="384" viewBox="0 0 512 384">
  <!-- ZX Spectrum End of Game Screen – Desert Rats (Allied Victory) -->
  <rect width="512" height="384" fill="#000000"/>
  <!-- Yellow border (Allied win) -->
  <rect x="0"   y="0"   width="512" height="32"  fill="#D4AA00"/>
  <rect x="0"   y="352" width="512" height="32"  fill="#D4AA00"/>
  <rect x="0"   y="32"  width="32"  height="320" fill="#D4AA00"/>
  <rect x="480" y="32"  width="32"  height="320" fill="#D4AA00"/>

  <!-- Victory text -->
  <text x="256" y="110" font-family="monospace" font-size="32" font-weight="bold"
        fill="#FFFF00" text-anchor="middle">ALLIED VICTORY!</text>

  <!-- Scenario info -->
  <text x="256" y="148" font-family="monospace" font-size="14"
        fill="#FFFFFF" text-anchor="middle">OPERATION CRUSADER – TURN 12/15</text>

  <!-- VP summary box -->
  <rect x="140" y="168" width="232" height="106" fill="#000088" rx="4" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="140" y1="185" x2="372" y2="185" stroke="#555599" stroke-width="1"/>
  <text x="256" y="182" font-family="monospace" font-size="13" fill="#AAAAFF" text-anchor="middle">FINAL SCORE</text>
  <text x="160" y="205" font-family="monospace" font-size="13" fill="#00FF00">ALLIED VP  :   32</text>
  <text x="160" y="223" font-family="monospace" font-size="13" fill="#FF6666">AXIS   VP  :   21</text>
  <line x1="140" y1="232" x2="372" y2="232" stroke="#555599" stroke-width="1"/>
  <text x="160" y="250" font-family="monospace" font-size="13" fill="#FFFF00">RESULT     : ALLIED WIN</text>
  <text x="160" y="265" font-family="monospace" font-size="11" fill="#AAAAAA">(margin: +11 VP)</text>

  <!-- Unit casualties -->
  <text x="256" y="300" font-family="monospace" font-size="12" fill="#AAAAAA" text-anchor="middle">ALLIED LOSSES: 2 units    AXIS LOSSES: 4 units</text>

  <!-- Play again -->
  <text x="256" y="340" font-family="monospace" font-size="16" font-weight="bold"
        fill="#FFFF00" text-anchor="middle">PLAY AGAIN?  Y / N</text>

  <!-- Placeholder label -->
  <text x="256" y="375" font-family="monospace" font-size="10" fill="#888888" text-anchor="middle">[ PLACEHOLDER – replace with real screenshot ]</text>
</svg>
