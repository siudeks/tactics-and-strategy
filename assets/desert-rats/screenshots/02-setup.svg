<svg xmlns="http://www.w3.org/2000/svg" width="512" height="384" viewBox="0 0 512 384">
  <!-- ZX Spectrum Setup Screen – Desert Rats -->
  <!-- Background: white paper -->
  <rect width="512" height="384" fill="#FFFFFF"/>
  <!-- White border -->
  <rect x="0"   y="0"   width="512" height="32"  fill="#CCCCCC"/>
  <rect x="0"   y="352" width="512" height="32"  fill="#CCCCCC"/>
  <rect x="0"   y="32"  width="32"  height="320" fill="#CCCCCC"/>
  <rect x="480" y="32"  width="32"  height="320" fill="#CCCCCC"/>
  <!-- Main area -->
  <rect x="32" y="32" width="448" height="320" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="256" y="80"
        font-family="monospace" font-size="22" font-weight="bold"
        fill="#000000" text-anchor="middle">SELECT SCENARIO</text>

  <!-- Divider -->
  <line x1="60" y1="95" x2="452" y2="95" stroke="#000000" stroke-width="1"/>

  <!-- Scenario options -->
  <text x="100" y="130" font-family="monospace" font-size="16" fill="#0000AA">▶</text>
  <text x="120" y="130" font-family="monospace" font-size="16" fill="#000000">1.  OPERATION BATTLEAXE</text>
  <text x="120" y="165" font-family="monospace" font-size="16" fill="#000000">2.  OPERATION CRUSADER</text>
  <text x="120" y="200" font-family="monospace" font-size="16" fill="#000000">3.  ROMMEL&#39;S BREAKTHROUGH</text>

  <!-- Divider -->
  <line x1="60" y1="220" x2="452" y2="220" stroke="#888888" stroke-width="1"/>

  <!-- Player / difficulty settings -->
  <text x="80" y="250" font-family="monospace" font-size="14" fill="#000000">NUMBER OF PLAYERS:  1 / 2</text>
  <text x="80" y="278" font-family="monospace" font-size="14" fill="#000000">DIFFICULTY:  EASY / NORMAL / HARD</text>

  <!-- Divider -->
  <line x1="60" y1="295" x2="452" y2="295" stroke="#888888" stroke-width="1"/>

  <!-- Instruction line -->
  <text x="256" y="322" font-family="monospace" font-size="12" fill="#555555" text-anchor="middle">USE 1-3 TO SELECT, ENTER TO CONFIRM</text>

  <!-- Placeholder label -->
  <text x="256" y="370" font-family="monospace" font-size="10" fill="#888888" text-anchor="middle">[ PLACEHOLDER – replace with real screenshot ]</text>
</svg>
